<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1210">
  <title>Whiskey Menu</title>
  <style>
/* ===== Base & Variables ===== */
:root {
  --bg-darkest: #0d0a08;
  --bg-dark: #1a1210;
  --bg-card: #241c17;
  --bg-card-hover: #2e241d;
  --bg-input: #1a1210;
  --border: #3d2e23;
  --border-light: #5a4332;
  --gold: #c8a46e;
  --gold-light: #dfc08a;
  --gold-dim: #8a6d3b;
  --text-primary: #e8ddd0;
  --text-secondary: #a89480;
  --text-muted: #6b5a4a;
  --accent-red: #8b3a3a;
  --wood-grain: linear-gradient(
    135deg,
    rgba(58, 42, 28, 0.3) 0%,
    rgba(42, 30, 20, 0.1) 30%,
    rgba(58, 42, 28, 0.2) 60%,
    rgba(42, 30, 20, 0.1) 100%
  );
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: -apple-system, 'Helvetica Neue', 'Noto Sans KR', sans-serif;
  background: var(--bg-darkest);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

/* ===== Menu View ===== */
#menu-view {
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg-darkest);
  background-image: var(--wood-grain);
}

/* Header */
.menu-header {
  text-align: center;
  padding: 32px 20px 16px;
  position: relative;
  flex-shrink: 0;
}

.header-ornament {
  width: 120px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto;
}

.menu-title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 42px;
  font-weight: 700;
  letter-spacing: 12px;
  color: var(--gold);
  margin: 8px 0 2px;
  text-shadow: 0 2px 20px rgba(200, 164, 110, 0.2);
}

.menu-subtitle {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 8px;
  color: var(--gold-dim);
  margin-bottom: 8px;
}

/* Search Bar */
.search-bar {
  padding: 0 24px 8px;
  flex-shrink: 0;
}

.search-bar input {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  display: block;
  padding: 10px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: -apple-system, 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}

.search-bar input:focus {
  border-color: var(--gold-dim);
}

.search-bar input::placeholder {
  color: var(--text-muted);
}

/* Category Nav */
.category-nav {
  display: flex;
  justify-content: center;
  gap: 4px;
  padding: 8px 20px 4px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.subcategory-nav {
  display: flex;
  justify-content: center;
  gap: 4px;
  padding: 4px 20px 16px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.subcategory-tab {
  background: none;
  border: 1px solid transparent;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 1px;
  padding: 4px 14px;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
}

.subcategory-tab:hover {
  color: var(--gold-light);
}

.subcategory-tab.active {
  border-color: var(--gold-dim);
  color: var(--gold);
  font-weight: 500;
}

.category-tab {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 2px;
  padding: 8px 20px;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
}

.category-tab:hover {
  border-color: var(--gold-dim);
  color: var(--gold-light);
}

.category-tab.active {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--bg-darkest);
  font-weight: 600;
}

/* Menu Grid */
.menu-grid {
  flex: 1;
  overflow-y: auto;
  padding: 0 24px 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  align-content: start;
}

/* Menu Card */
.menu-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px 24px;
  transition: all 0.3s;
}

.menu-card:hover {
  border-color: var(--gold-dim);
  background: var(--bg-card-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

.card-body {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}

.card-name {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--gold-light);
  line-height: 1.3;
}

.card-name-en {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 400;
  margin-top: 1px;
}

.card-abv {
  font-size: 12px;
  color: var(--text-secondary);
  background: rgba(200, 164, 110, 0.1);
  padding: 2px 8px;
  border-radius: 2px;
  border: 1px solid var(--border);
  white-space: nowrap;
  flex-shrink: 0;
}

.card-region {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.card-notes {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  font-weight: 300;
}

.card-price {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--gold);
  margin-top: 4px;
}

.card-price span {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-muted);
}

.card-prices {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-top: 4px;
}

.card-bottle-price {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 14px;
  color: var(--text-secondary);
}

.card-bottle-price span {
  font-size: 11px;
  color: var(--text-muted);
}

/* Empty State */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 18px;
}

.empty-hint {
  font-size: 14px;
  margin-top: 8px;
  color: var(--text-muted);
  opacity: 0.6;
}

/* Admin Toggle */
.admin-toggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  opacity: 0.4;
  z-index: 100;
}

.admin-toggle:hover {
  opacity: 1;
  border-color: var(--gold-dim);
  color: var(--gold);
}

/* ===== Admin View ===== */
.admin-view {
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg-darkest);
}

.admin-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
  gap: 12px;
}

.admin-header h2 {
  font-family: Georgia, 'Times New Roman', serif;
  color: var(--gold);
  font-size: 22px;
}

.admin-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.admin-list {
  flex: 1;
  overflow-y: auto;
  padding: 16px 24px;
}

.admin-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 8px;
  transition: background 0.2s;
}

.admin-item:hover {
  background: var(--bg-card-hover);
}

.admin-item-info {
  flex: 1;
}

.admin-item-name {
  font-weight: 500;
  color: var(--gold-light);
  font-size: 16px;
}

.admin-item-detail {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.admin-item.soldout-item {
  opacity: 0.4;
}

.menu-card.soldout {
  position: relative;
  opacity: 0.4;
  pointer-events: none;
}

.soldout-badge {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-12deg);
  background: transparent;
  border: 2px solid var(--accent-red);
  color: var(--accent-red);
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 4px;
  padding: 6px 20px;
  text-transform: uppercase;
  white-space: nowrap;
  z-index: 2;
}

.admin-item-actions {
  display: flex;
  gap: 8px;
}

.btn-visible {
  background: rgba(200, 164, 110, 0.15);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  font-size: 12px;
}

.btn-hidden {
  background: rgba(139, 58, 58, 0.2);
  border: 1px solid var(--accent-red);
  color: var(--accent-red);
  font-size: 11px;
  letter-spacing: 1px;
}

/* ===== Buttons ===== */
.btn {
  padding: 10px 20px;
  border-radius: 4px;
  font-size: 14px;
  font-family: -apple-system, 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  font-weight: 500;
}

.btn-primary {
  background: var(--gold);
  color: var(--bg-darkest);
}

.btn-primary:hover {
  background: var(--gold-light);
}

.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

.btn-outline:hover {
  border-color: var(--gold-dim);
  color: var(--gold-light);
}

.btn-danger {
  background: var(--accent-red);
  color: var(--text-primary);
}

.btn-danger:hover {
  background: #a04444;
}

.btn-close {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

.btn-close:hover {
  background: var(--bg-card);
}

.btn-small {
  padding: 6px 14px;
  font-size: 13px;
}

/* ===== Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}

.modal {
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 32px;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
}

.modal-small {
  max-width: 400px;
  text-align: center;
}

.modal-small p {
  margin: 16px 0 24px;
  color: var(--text-secondary);
}

.modal h3 {
  font-family: Georgia, 'Times New Roman', serif;
  color: var(--gold);
  font-size: 22px;
  margin-bottom: 24px;
}

.modal-buttons {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 24px;
}

/* ===== Forms ===== */
.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 6px;
  font-weight: 500;
}

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: -apple-system, 'Noto Sans KR', sans-serif;
  transition: border-color 0.2s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--gold-dim);
}

.form-group select {
  cursor: pointer;
}

.form-group select option {
  background: var(--bg-dark);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* ===== PIN Input ===== */
.pin-input-wrap {
  margin: 20px 0 8px;
}

.pin-input {
  width: 160px;
  padding: 14px 20px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--gold);
  font-size: 28px;
  font-family: Georgia, serif;
  text-align: center;
  letter-spacing: 12px;
  transition: border-color 0.2s;
}

.pin-input:focus {
  outline: none;
  border-color: var(--gold-dim);
}

.pin-error {
  color: var(--accent-red) !important;
  font-size: 13px !important;
  margin: 0 0 8px !important;
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .menu-title { font-size: 32px; letter-spacing: 8px; }
  .menu-subtitle { font-size: 12px; }
  .menu-header { padding: 20px 16px 12px; }
  .category-nav { padding: 4px 16px 12px; }
  .category-tab { font-size: 13px; padding: 6px 14px; }
  .menu-grid { padding: 0 16px 16px; grid-template-columns: 1fr; gap: 12px; }
  .card-name { font-size: 16px; }
  .card-price { font-size: 18px; }
  .admin-header { flex-direction: column; align-items: flex-start; }
}

@media (min-width: 1200px) {
  .menu-grid { grid-template-columns: repeat(3, 1fr); }
}
  </style>
</head>
<body>
  <!-- Menu View -->
  <div id="menu-view">
    <header class="menu-header">
      <div class="header-ornament"></div>
      <h1 class="menu-title">WHISKEY</h1>
      <p class="menu-subtitle">COLLECTION</p>
      <div class="header-ornament"></div>
    </header>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="검색..." autocomplete="off">
    </div>
    <nav class="category-nav" id="category-nav"></nav>
    <nav class="subcategory-nav" id="subcategory-nav"></nav>

    <main class="menu-grid" id="menu-grid"></main>

    <div class="empty-state" id="empty-state" style="display:none;">
      <p>메뉴가 비어있습니다</p>
      <p class="empty-hint">관리자 모드에서 위스키를 추가해주세요</p>
    </div>

    <button class="admin-toggle" id="admin-toggle" title="관리자 모드">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
      </svg>
    </button>
  </div>

  <!-- Admin View -->
  <div id="admin-view" class="admin-view" style="display:none;">
    <header class="admin-header">
      <h2>관리자 모드</h2>
      <div class="admin-actions">
        <button class="btn btn-outline" id="btn-export">백업 내보내기</button>
        <button class="btn btn-outline" id="btn-import">백업 가져오기</button>
        <input type="file" id="import-file" accept=".json" style="display:none;">
        <button class="btn btn-primary" id="btn-add">+ 위스키 추가</button>
        <button class="btn btn-close" id="btn-close-admin">닫기</button>
      </div>
    </header>

    <div class="admin-list" id="admin-list"></div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modal" style="display:none;">
    <div class="modal">
      <h3 id="modal-title">위스키 추가</h3>
      <form id="whiskey-form">
        <input type="hidden" id="form-id">

        <div class="form-group">
          <label for="form-name">이름 *</label>
          <input type="text" id="form-name" required placeholder="예: 맥켈란 18">
        </div>

        <div class="form-group">
          <label for="form-name-en">영어 이름</label>
          <input type="text" id="form-name-en" placeholder="예: Macallan 18">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="form-category">카테고리 *</label>
            <select id="form-category" required>
              <option value="">선택</option>
              <option value="scotch">Scotch</option>
              <option value="bourbon">Bourbon</option>
              <option value="rye">Rye</option>
              <option value="japanese">Japanese</option>
              <option value="ib">Independent Bottler</option>
              <option value="cocktail">Cocktail</option>
              <option value="signature">Signature</option>
              <option value="cognac">Cognac & Calvados</option>
              <option value="rum">Rum & Tequila</option>
              <option value="food">Food</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="form-subcategory">세부 지역</label>
            <select id="form-subcategory">
              <option value="">없음</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="form-region">지역 (직접 입력)</label>
            <input type="text" id="form-region" placeholder="목록에 없는 경우 직접 입력">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="form-price">한잔 가격 (원) *</label>
            <input type="number" id="form-price" required placeholder="예: 25000">
          </div>
          <div class="form-group">
            <label for="form-bottle-price">바틀 가격 (원)</label>
            <input type="number" id="form-bottle-price" placeholder="없으면 비워두기">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="form-abv">도수 (%)</label>
            <input type="number" id="form-abv" step="0.1" placeholder="예: 43">
          </div>
        </div>

        <div class="form-group">
          <label for="form-notes">테이스팅 노트</label>
          <textarea id="form-notes" rows="3" placeholder="예: 셰리 오크의 풍부한 과일향, 바닐라, 시나몬"></textarea>
        </div>

        <div class="form-group">
          <label for="form-order">정렬 순서</label>
          <input type="number" id="form-order" value="0" placeholder="낮을수록 앞에 표시">
        </div>

        <div class="modal-buttons">
          <button type="button" class="btn btn-outline" id="btn-cancel">취소</button>
          <button type="submit" class="btn btn-primary">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- PIN Modal -->
  <div class="modal-overlay" id="pin-modal" style="display:none;">
    <div class="modal modal-small">
      <h3>관리자 인증</h3>
      <p>비밀번호를 입력하세요</p>
      <div class="pin-input-wrap">
        <input type="password" id="pin-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" class="pin-input" placeholder="····">
      </div>
      <p class="pin-error" id="pin-error" style="display:none;">비밀번호가 틀렸습니다</p>

let items = loadData();
if (items.length === 0) {
  items = SAMPLE_DATA;
  saveData(items);
}
let activeCategory = 'all';
let activeSubCategory = 'all';
let searchQuery = '';
let deleteTargetId = null;

// ===== DOM Refs =====
const menuView = document.getElementById('menu-view');
const adminView = document.getElementById('admin-view');
const categoryNav = document.getElementById('category-nav');
const subcategoryNav = document.getElementById('subcategory-nav');
const menuGrid = document.getElementById('menu-grid');
const emptyState = document.getElementById('empty-state');
const adminList = document.getElementById('admin-list');
const modal = document.getElementById('modal');
const deleteModal = document.getElementById('delete-modal');
const form = document.getElementById('whiskey-form');

// ===== Render: Categories =====
function renderCategories() {
  const usedCategories = new Set(items.map(i => i.category));
  categoryNav.innerHTML = '';

  Object.entries(CATEGORIES).forEach(([key, label]) => {
    if (key !== 'all' && !usedCategories.has(key)) return;
    if (key === 'all' && items.length === 0) return;

    const btn = document.createElement('button');
    btn.className = 'category-tab' + (activeCategory === key ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => {
      activeCategory = key;
      activeSubCategory = 'all';
      renderCategories();
      renderSubCategories();
      renderMenu();
    };
    categoryNav.appendChild(btn);
  });

  renderSubCategories();
}

function renderSubCategories() {
  subcategoryNav.innerHTML = '';
  const subs = SUB_CATEGORIES[activeCategory];
  if (!subs) return;

  const usedRegions = new Set(
    items.filter(i => i.category === activeCategory).map(i => i.region)
  );

  const visibleSubs = subs.filter(s => usedRegions.has(s));
  if (visibleSubs.length <= 1) return;

  const allBtn = document.createElement('button');
  allBtn.className = 'subcategory-tab' + (activeSubCategory === 'all' ? ' active' : '');
  allBtn.textContent = 'All';
  allBtn.onclick = () => {
    activeSubCategory = 'all';
    renderSubCategories();
    renderMenu();
  };
  subcategoryNav.appendChild(allBtn);

  visibleSubs.forEach(sub => {
    const btn = document.createElement('button');
    btn.className = 'subcategory-tab' + (activeSubCategory === sub ? ' active' : '');
    btn.textContent = sub;
    btn.onclick = () => {
      activeSubCategory = sub;
      renderSubCategories();
      renderMenu();
    };
    subcategoryNav.appendChild(btn);
  });
}

// ===== Render: Menu Cards =====
function renderMenu() {
  const filtered = items
    .filter(i => {
      if (!searchQuery) return true;
      return (i.name && i.name.toLowerCase().includes(searchQuery))
        || (i.nameEn && i.nameEn.toLowerCase().includes(searchQuery))
        || (i.notes && i.notes.toLowerCase().includes(searchQuery));
    })
    .filter(i => activeCategory === 'all' || i.category === activeCategory)
    .filter(i => activeSubCategory === 'all' || i.region === activeSubCategory)
    .sort((a, b) => (a.order || 0) - (b.order || 0));

  if (filtered.length === 0 && items.length === 0) {
    menuGrid.style.display = 'none';
    emptyState.style.display = 'flex';
    return;
  }

  emptyState.style.display = 'none';
  menuGrid.style.display = 'grid';

  menuGrid.innerHTML = filtered.map(item => `
    <div class="menu-card${item.hidden ? ' soldout' : ''}">
      ${item.hidden ? '<div class="soldout-badge">SOLD OUT</div>' : ''}
      <div class="card-body">
        <div class="card-header">
          <div>
            <div class="card-name">${escapeHtml(item.name)}</div>
            ${item.nameEn ? `<div class="card-name-en">${escapeHtml(item.nameEn)}</div>` : ''}
          </div>
          ${item.abv ? `<div class="card-abv">${item.abv}%</div>` : ''}
        </div>
        ${item.region ? `<div class="card-region">${escapeHtml(item.region)}</div>` : ''}
        ${item.notes ? `<div class="card-notes">${escapeHtml(item.notes)}</div>` : ''}
        <div class="card-prices">
          <div class="card-price">${formatPrice(item.price)}<span> 원</span></div>
          ${item.bottlePrice ? `<div class="card-bottle-price">Bottle ${formatPrice(item.bottlePrice)}<span> 원</span></div>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

// ===== Render: Admin List =====
function renderAdminList() {
  const sorted = [...items].sort((a, b) => (a.order || 0) - (b.order || 0));

  if (sorted.length === 0) {
    adminList.innerHTML = '<div class="empty-state"><p>등록된 위스키가 없습니다</p></div>';
    return;
  }

  adminList.innerHTML = sorted.map(item => `
    <div class="admin-item${item.hidden ? ' soldout-item' : ''}">
      <div class="admin-item-info">
        <div class="admin-item-name">${escapeHtml(item.name)}</div>
        <div class="admin-item-detail">
          ${CATEGORIES[item.category] || item.category}
          ${item.region ? ' · ' + escapeHtml(item.region) : ''}
          ${item.abv ? ' · ' + item.abv + '%' : ''}
           · ${formatPrice(item.price)}원
          ${item.bottlePrice ? ' · Bottle ' + formatPrice(item.bottlePrice) + '원' : ''}
        </div>
      </div>
      <div class="admin-item-actions">
        <button class="btn ${item.hidden ? 'btn-hidden' : 'btn-visible'} btn-small" onclick="toggleHidden('${item.id}')">${item.hidden ? 'SOLD OUT' : '판매중'}</button>
        <button class="btn btn-outline btn-small" onclick="editItem('${item.id}')">수정</button>
        <button class="btn btn-danger btn-small" onclick="confirmDelete('${item.id}')">삭제</button>
      </div>
    </div>
  `).join('');
}

// ===== PIN / Admin Toggle =====
const ADMIN_PIN = '0000';
const pinModal = document.getElementById('pin-modal');
const pinInput = document.getElementById('pin-input');
const pinError = document.getElementById('pin-error');

document.getElementById('admin-toggle').onclick = () => {
  pinInput.value = '';
  pinError.style.display = 'none';
  pinModal.style.display = 'flex';
  setTimeout(() => pinInput.focus(), 100);
};

document.getElementById('btn-pin-confirm').onclick = () => {
  if (pinInput.value === ADMIN_PIN) {
    pinModal.style.display = 'none';
    menuView.style.display = 'none';
    adminView.style.display = 'flex';
    renderAdminList();
  } else {
    pinError.style.display = 'block';
    pinInput.value = '';
    pinInput.focus();
  }
};

document.getElementById('btn-pin-cancel').onclick = () => {
  pinModal.style.display = 'none';
};

pinInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('btn-pin-confirm').click();
});

pinModal.onclick = (e) => { if (e.target === pinModal) pinModal.style.display = 'none'; };

document.getElementById('btn-close-admin').onclick = () => {
  adminView.style.display = 'none';
  menuView.style.display = 'flex';
  renderCategories();
  renderMenu();
};

// ===== Add / Edit Modal =====
document.getElementById('btn-add').onclick = () => openModal();

function updateSubCategoryOptions(category, selected) {
  const sel = document.getElementById('form-subcategory');
  sel.innerHTML = '<option value="">없음</option>';
  const subs = SUB_CATEGORIES[category];
  if (subs) {
    subs.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      if (s === selected) opt.selected = true;
      sel.appendChild(opt);
    });
  }
}

document.getElementById('form-category').onchange = (e) => {
  updateSubCategoryOptions(e.target.value, '');
};

document.getElementById('form-subcategory').onchange = (e) => {
  if (e.target.value) {
    document.getElementById('form-region').value = e.target.value;
  }
};

function openModal(item = null) {
  document.getElementById('modal-title').textContent = item ? '위스키 수정' : '위스키 추가';
  document.getElementById('form-id').value = item ? item.id : '';
  document.getElementById('form-name').value = item ? item.name : '';
  document.getElementById('form-name-en').value = item ? (item.nameEn || '') : '';
  document.getElementById('form-category').value = item ? item.category : '';
  updateSubCategoryOptions(item ? item.category : '', item ? item.region : '');
  document.getElementById('form-region').value = item ? (item.region || '') : '';
  document.getElementById('form-price').value = item ? item.price : '';
  document.getElementById('form-bottle-price').value = item && item.bottlePrice ? item.bottlePrice : '';
  document.getElementById('form-abv').value = item ? (item.abv || '') : '';
  document.getElementById('form-notes').value = item ? (item.notes || '') : '';
  document.getElementById('form-order').value = item ? (item.order || 0) : 0;

  modal.style.display = 'flex';
}

window.editItem = function(id) {
  const item = items.find(i => i.id === id);
  if (item) openModal(item);
};

document.getElementById('btn-cancel').onclick = () => {
  modal.style.display = 'none';
};

// Form submit
form.onsubmit = (e) => {
  e.preventDefault();
  const id = document.getElementById('form-id').value;

  const data = {
    id: id || generateId(),
    name: document.getElementById('form-name').value.trim(),
    nameEn: document.getElementById('form-name-en').value.trim() || null,
    category: document.getElementById('form-category').value,
    region: document.getElementById('form-region').value.trim(),
    price: Number(document.getElementById('form-price').value),
    bottlePrice: Number(document.getElementById('form-bottle-price').value) || null,
    abv: Number(document.getElementById('form-abv').value) || null,
    notes: document.getElementById('form-notes').value.trim(),
    order: Number(document.getElementById('form-order').value) || 0,
  };

  if (id) {
    items = items.map(i => i.id === id ? data : i);
  } else {
    items.push(data);
  }

  saveData(items);
  modal.style.display = 'none';
  renderAdminList();
};

// ===== Delete =====
window.toggleHidden = function(id) {
  items = items.map(i => i.id === id ? {...i, hidden: !i.hidden} : i);
  saveData(items);
  renderAdminList();
};

window.confirmDelete = function(id) {
  deleteTargetId = id;
  const item = items.find(i => i.id === id);
  document.getElementById('delete-msg').textContent = `"${item.name}"을(를) 삭제하시겠습니까?`;
  deleteModal.style.display = 'flex';
};

document.getElementById('btn-delete-cancel').onclick = () => {
  deleteModal.style.display = 'none';
  deleteTargetId = null;
};

document.getElementById('btn-delete-confirm').onclick = () => {
  if (deleteTargetId) {
    items = items.filter(i => i.id !== deleteTargetId);
    saveData(items);
    deleteTargetId = null;
    deleteModal.style.display = 'none';
    renderAdminList();
  }
};

// ===== Export / Import =====
document.getElementById('btn-export').onclick = () => {
  const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `whiskey_backup_${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
};

document.getElementById('btn-import').onclick = () => {
  document.getElementById('import-file').click();
};

document.getElementById('import-file').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) throw new Error('Invalid format');
      items = imported;
      saveData(items);
      renderAdminList();
      alert(`${imported.length}개의 위스키를 가져왔습니다.`);
    } catch {
      alert('올바른 백업 파일이 아닙니다.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
};

// ===== Utilities =====
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Close modals on overlay click
modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
deleteModal.onclick = (e) => { if (e.target === deleteModal) deleteModal.style.display = 'none'; };

// ===== Search =====
document.getElementById('search-input').oninput = (e) => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderCategories();
  renderMenu();
};

// ===== Init =====
renderCategories();
renderMenu();
  </script>
</body>
</html>
